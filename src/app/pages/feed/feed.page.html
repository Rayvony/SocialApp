<div class="feed-content">
  <div class="feed-column">
    <app-post-composer
      [userName]="user?.name ?? ''"
      [userAvatar]="user?.avatar"
      (onPost)="onPostCreated($event)"
    />

    @if (posts.length === 0) {
      <div class="feed-empty">
        <ui-icon name="inbox" [size]="48" className="text-muted" />
        <p>No hay posts todavía. ¡Sé el primero en publicar!</p>
      </div>
    }

    @for (post of posts; track post.id) {
      <app-post-card
        [post]="post"
        [liked]="isLiked(post)"
        [showComments]="expandedPostId() === post.id"
        [comments]="commentsForPost(post.id)"
        (onLike)="onToggleLike(post.id)"
        (onToggleComments)="onToggleComments(post.id)"
        (onComment)="onCommentAdded(post.id, $event)"
        (onDelete)="onDeletePost(post.id)"
        (onSaveEdit)="onEditPost($event)"
      />
    }
  </div>
</div>
