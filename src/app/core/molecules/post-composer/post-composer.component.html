<div class="composer" [class.composer-focused]="focused()">
  <div class="composer-top">
    @if (mode() === 'create') {
      @if (userAvatar()) {
        <img [src]="userAvatar()" [alt]="userName()" class="composer-avatar" />
      } @else {
        <div class="composer-avatar-placeholder">
          <ui-icon name="user" [size]="20" />
        </div>
      }
    }
    <textarea
      class="composer-textarea"
      [value]="content()"
      [placeholder]="'¿Qué estás pensando, ' + userName() + '?'"
      rows="1"
      maxlength="320"
      (input)="onInput($any($event.target).value)"
      (focus)="onFocus()"
      (blur)="onBlur()"
      (keydown)="onKeyDown($event)"
    ></textarea>
    @if (imageUrl()) {
      <div class="composer-image-preview">
        <img [src]="imageUrl()" alt="Imagen seleccionada" />
        <button type="button" class="composer-image-remove" (click)="removeImage()">
          <ui-icon name="x" [size]="14" />
        </button>
      </div>
    }
  </div>

  @if (focused()) {
    <div class="composer-bottom">
      <span [class]="charsClass">{{ charsLeft }}</span>
      <div class="composer-buttons">
        @if (mode() === 'edit') {
          <ui-button variant="primary" size="sm" (onClick)="cancel()">
            <ui-icon name="x" [size]="15" />
            Cancelar
          </ui-button>
        }
        @if (mode() === 'create' && content().length) {
          <label class="composer-image-button">
            <ui-icon name="image" [size]="15" />
            Imagen
            <input type="file" accept="image/*" hidden (change)="onImageSelected($event)" />
          </label>
        }
        <ui-button variant="primary" size="sm" [disabled]="!canSubmit" (onClick)="submit()">
          <ui-icon name="send" [size]="15" />
          @if (mode() === 'edit') {
            Editar
          } @else {
            Publicar
          }
        </ui-button>
      </div>
    </div>
  }
</div>
